services:
  mysql-primary:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}/library/mysql:8.0
    container_name: seckill-mysql-primary
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/primary/01-create-repl-user.sql:/docker-entrypoint-initdb.d/02-create-repl-user.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog_format=ROW
      - --gtid_mode=ON
      - --enforce_gtid_consistency=ON
    networks:
      - seckill-net

  mysql-replica:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}/library/mysql:8.0
    container_name: seckill-mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      mysql-primary:
        condition: service_healthy
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/replica/01-setup-replication.sh:/docker-entrypoint-initdb.d/02-setup-replication.sh:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --server-id=2
      - --relay-log=relay-bin
      - --read-only=ON
      - --gtid_mode=ON
      - --enforce_gtid_consistency=ON
    networks:
      - seckill-net

  redis:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}/library/redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    networks:
      - seckill-net

  kafka:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}/bitnami/kafka:3.7
    container_name: seckill-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    networks:
      - seckill-net

  app1:
    build:
      context: .
      args:
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}
    container_name: seckill-app-1
    environment:
      SPRING_DATASOURCE_WRITE_URL: jdbc:mysql://mysql-primary:3306/seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_WRITE_USERNAME: root
      SPRING_DATASOURCE_WRITE_PASSWORD: root
      SPRING_DATASOURCE_READ_URL: jdbc:mysql://mysql-replica:3306/seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_READ_USERNAME: root
      SPRING_DATASOURCE_READ_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECKILL_SEARCH_ES_BASE_URL: http://elasticsearch:9200
      SECKILL_ID_WORKER_ID: 1
      SERVER_PORT: 8081
    depends_on:
      - mysql-primary
      - mysql-replica
      - redis
      - kafka
    ports:
      - "8081:8081"
    networks:
      - seckill-net

  app2:
    build:
      context: .
      args:
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}
    container_name: seckill-app-2
    environment:
      SPRING_DATASOURCE_WRITE_URL: jdbc:mysql://mysql-primary:3306/seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_WRITE_USERNAME: root
      SPRING_DATASOURCE_WRITE_PASSWORD: root
      SPRING_DATASOURCE_READ_URL: jdbc:mysql://mysql-replica:3306/seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_READ_USERNAME: root
      SPRING_DATASOURCE_READ_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECKILL_SEARCH_ES_BASE_URL: http://elasticsearch:9200
      SECKILL_ID_WORKER_ID: 2
      SERVER_PORT: 8082
    depends_on:
      - mysql-primary
      - mysql-replica
      - redis
      - kafka
    ports:
      - "8082:8082"
    networks:
      - seckill-net

  nginx:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io}/library/nginx:1.25-alpine
    container_name: seckill-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
    networks:
      - seckill-net

  # 可选：商品搜索（Elasticsearch）
  elasticsearch:
    profiles: ["es"]
    image: docker.m.daocloud.io/library/elasticsearch:8.13.4
    container_name: seckill-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9200 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge
