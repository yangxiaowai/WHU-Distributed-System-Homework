spring:
  application:
    name: seckill-user-service

  datasource:
    write:
      url: ${SPRING_DATASOURCE_WRITE_URL:jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
      username: ${SPRING_DATASOURCE_WRITE_USERNAME:root}
      password: ${SPRING_DATASOURCE_WRITE_PASSWORD:root}
      driver-class-name: com.mysql.cj.jdbc.Driver
    read:
      url: ${SPRING_DATASOURCE_READ_URL:jdbc:mysql://localhost:3307/seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
      username: ${SPRING_DATASOURCE_READ_USERNAME:root}
      password: ${SPRING_DATASOURCE_READ_PASSWORD:root}
      driver-class-name: com.mysql.cj.jdbc.Driver

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # 作业环境中使用默认 0 号库
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP:seckill-order-consumer}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.seckill.order.message
        spring.json.value.default.type: com.example.seckill.order.message.SeckillOrderMessage
    listener:
      missing-topics-fatal: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.seckill
  configuration:
    map-underscore-to-camel-case: true

seckill:
  search:
    es:
      # 可选项：不启动 ES 时可设为 false（或删除 docker-compose 中的 elasticsearch 服务）
      enabled: ${SECKILL_SEARCH_ES_ENABLED:true}
      base-url: ${SECKILL_SEARCH_ES_BASE_URL:http://localhost:9200}
  order:
    async-enabled: ${SECKILL_ORDER_ASYNC_ENABLED:true}
    topic: ${SECKILL_ORDER_TOPIC:seckill-order-create}
    status-ttl-hours: ${SECKILL_ORDER_STATUS_TTL_HOURS:24}
  id:
    worker-id: ${SECKILL_ID_WORKER_ID:1}
    datacenter-id: ${SECKILL_ID_DATACENTER_ID:1}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.security: warn
    com.example.seckill: info
